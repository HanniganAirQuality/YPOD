# ==============================================================================
# YPOD Header Log
# ==============================================================================
# description: This document logs header changes across versions for certain monitors
# author: Percy Smith
# date: May 13, 2026
# ==============================================================================
# STRUCTURE NOTES:
#   Each version entry contains:
#     - date:      when this version was introduced
#     - changelog: what changed from the previous version
#     - filetype:  SD file type, .TXT or .CSV
#     - SD:        column definitions for SD-logged columns (write order preserved)
#     - Serial:    needed because of live visualization integrations -- helpful to have headers
#
#   Each header has:
#     - unit:        (required) physical or encoded unit of the value
#     - dtype:       (required) C/embedded data type as logged by firmware
#     - format:      (optional) format string, used where encoding is non-obvious
#     - sensor:      (optional) sensor IC that produced the reading
#     - adc:         (optional) ADC used for digitization, if applicable
#     - adc_mode:    (optional) single-ended or differential with channel notation
#     - description: (optional) plain-language notes for analysts and developers
#
#   Naming convention:
#     - Full words preferred over abbreviations (Temperature not T, Pressure not P)
#     - Sensor-prefixed where multiple sensors report the same measurand (MiCS2611_Ozone, MQ131_Ozone)
#     - Casing: PascalCase for compound names, sensor model names preserved as-is
# ==============================================================================

YPOD_V3_1_2:
  date: 2024-03-19
  changelog: No longer available on github! 
  SD_fileinfo: 
    FileName: YPODID_YYYY_MM_dd
    FileType: .TXT
  SD: 
    YPODID: 
      unit: ID
      dtype: string
    Date:
      unit: date
      dtype: string
      format: "YYYY-MM-dd"
      sensor: DS3231
    Time:
      unit: time
      dtype: string
      format: "hh:mm:ss"
      sensor: DS3231
    BME180_Temperature:
      unit: Celsius
      dtype: double
      sensor: BME180
      error_messages: 
        -99: Failed measurement
    BME180_Pressure:
      unit: millibar
      dtype: double
      sensor: BME180
      error_messages: 
        -99: Failed measurement
    SHT25_Temperature:
      unit: Celsius
      dtype: float
      sensor: SHT25 
      description: Calculated from equation ((175.72 * (float)temperature_board) / (65536)) - 46.85
    SHT25_Humidity:
      unit: "%RH"
      dtype: float
      sensor: SHT25
      description: Calculated from equation ((125 * (float)humidity_board) / (65536)) - 6.00
    ELT_CO2:
      unit: ppm #ALLEGEDLY
      dtype: uint16_t
      sensor: ELT S300-3V
    PM10_ENV: 
      unit: ug/m^3 #ALLEGEDLY
      dtype: uint16_t
      sensor: Plantower PMS5003
      description: Environmental PM1.0 concentration
    PM25_ENV: 
      unit: ug/m^3 #ALLEGEDLY
